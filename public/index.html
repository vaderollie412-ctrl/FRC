<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title> FRC Live </title>
<link rel="icon" type="image/png" href="struens-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --red:    #ff3b3b;
  --blue:   #6ee7ff;
  --bg:     #0d0d10;
  --card:   #16161c;
  --panel:  #111117;
  --border: #2a2a35;
  --text:   #e8e8f0;
  --muted:  #7a7a90;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  padding: 28px 24px;
  min-height: 100vh;
}

header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  margin-bottom: 6px;
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

h1 span { color: var(--red); }

#date {
  font-size: 0.95rem;
  color: var(--muted);
  margin-bottom: 20px;
  font-weight: 500;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

.tab-btn {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
}

.tab-btn:hover { color: var(--text); border-color: #3a3a50; }
.tab-btn:active { transform: scale(0.97); }

.tab-btn.active {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

select {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 14px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

select:hover, select:focus { border-color: var(--blue); }

button {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}

button:hover  { background: #e02d2d; }
button:active { transform: scale(0.97); }

#loading {
  display: none;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 20px;
}

.spinner {
  width: 20px;
  height: 20px;
  border: 3px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
  gap: 22px;
}

/* ── Card ── */
.event {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s;
}

.event:hover { border-color: #3a3a50; }

/* Summary — original padding/gap preserved exactly */
.event-summary {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.event-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-badge {
  background: var(--red);
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.nostream-badge {
  background: #2a2a35;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

/* Clickable event name */
.event-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.2;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.event-name:hover { color: var(--blue); }

.chevron {
  font-size: 0.65rem;
  color: var(--muted);
  transition: transform 0.22s;
  display: inline-block;
  flex-shrink: 0;
}

.event.open .chevron { transform: rotate(90deg); }

.event-meta {
  font-size: 0.82rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.event-meta a {
  color: var(--blue);
  text-decoration: none;
  font-weight: 500;
}

.event-meta a:hover { text-decoration: underline; }

.no-stream-msg {
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
}

.rankings { font-size: 0.82rem; }

.rankings-title {
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.rankings table { width: 100%; border-collapse: collapse; }
.rankings td { padding: 3px 8px 3px 0; color: var(--text); }
.rankings td:first-child { color: var(--muted); width: 24px; }
.rankings td.team {
  color: var(--blue);
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
}
.rankings td.record { color: var(--muted); text-align: right; }

.next-match { font-size: 0.85rem; color: var(--muted); }
.next-match b { color: var(--text); }

.schedule-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
  margin-top: 4px;
}

.schedule-table th {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 8px 5px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.schedule-table th:last-child { text-align: right; }

.schedule-table td {
  padding: 4px 8px 4px 0;
  border-bottom: 1px solid #1a1a24;
  vertical-align: middle;
}

.schedule-table td:last-child { text-align: right; }

.schedule-table tr.next-row td { color: var(--text); }

.schedule-match-key {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--blue);
}

.schedule-table tr.next-row .schedule-match-key { color: var(--red); }

.eta-cell { font-variant-numeric: tabular-nums; color: var(--muted); white-space: nowrap; }

.on-field {
  color: var(--red);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  animation: blink-red 1s ease-in-out infinite;
}

@keyframes blink-red {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.schedule-title {
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.empty { color: var(--muted); font-size: 1rem; padding: 20px 0; }

/* ── Expanded panel ── */
.event-panel {
  display: none;
  flex-direction: column;
  border-top: 1px solid var(--border);
  background: var(--panel);
}

.event.open .event-panel { display: flex; }

.panel-stream iframe {
  width: 100%;
  height: 270px;
  border: none;
  border-radius: 0;
  background: #000;
  display: block;
}

.panel-stream .no-stream-msg {
  padding: 16px 18px;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
}

.panel-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}

.panel-col {
  padding: 16px 18px;
}

.panel-col:first-child {
  border-right: 1px solid var(--border);
}

.panel-title {
  color: var(--muted);
  font-size: 0.72rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Full rankings in panel */
.full-rank-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.full-rank-table th {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 6px 6px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.full-rank-table th:last-child { text-align: right; }

.full-rank-table td {
  padding: 4px 6px 4px 0;
  border-bottom: 1px solid #1a1a24;
}

.full-rank-table td:first-child { color: var(--muted); width: 22px; }
.full-rank-table td.team {
  color: var(--blue);
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
}
.full-rank-table td.record { color: var(--muted); text-align: right; }

/* Recent matches in panel */
.matches-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.matches-table th {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 0 6px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.matches-table td {
  padding: 5px 0;
  border-bottom: 1px solid #1a1a24;
  vertical-align: top;
}

.match-key {
  color: var(--muted);
  font-size: 0.78rem;
  white-space: nowrap;
  padding-right: 10px;
}

.score-line {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}

.score-red  { color: #ff6b6b; }
.score-blue { color: #6eb8ff; }
.score-sep  { color: var(--muted); font-size: 0.8rem; }

.teams-line {
  font-size: 0.74rem;
  color: var(--muted);
  margin-top: 2px;
}

.teams-red  { color: #ff9a9a; }
.teams-blue { color: #9ac8ff; }

.panel-empty {
  color: var(--muted);
  font-size: 0.82rem;
  font-style: italic;
}

/* ── Multiview ── */
#view-multiview { display: none; }

.multiview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap: 20px;
}

.mv-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s;
}

.mv-card:hover { border-color: #3a3a50; }

.mv-header {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}

.mv-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mv-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.2;
}

.mv-meta {
  font-size: 0.8rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.mv-meta a {
  color: var(--blue);
  text-decoration: none;
  font-weight: 500;
}

.mv-meta a:hover { text-decoration: underline; }

.mv-stream iframe {
  width: 100%;
  height: 270px;
  border: none;
  background: #000;
  display: block;
}

.mv-stream .no-stream-msg {
  padding: 20px 16px;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
  text-align: center;
}

</style>
</head>
<body>

<header>
  <h1>FRC <span>Live</span> Dashboard</h1>
</header>
<div id="date"></div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
  <button class="tab-btn" onclick="switchTab('multiview')">Multiview</button>
</div>

<div class="controls">
  <select id="week">
    <option value="all">All Weeks</option>
    <option value="0">Week 1</option>
    <option value="1">Week 2</option>
    <option value="2">Week 3</option>
    <option value="3">Week 4</option>
    <option value="4">Week 5</option>
    <option value="5">Week 6</option>
    <option value="6">Week 7</option>
  </select>
  <button onclick="load()">↺ Refresh</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  Loading events...
</div>

<!-- Dashboard view -->
<div id="view-dashboard">
  <div class="grid" id="streams"></div>
</div>

<!-- Multiview -->
<div id="view-multiview">
  <div class="multiview-grid" id="multiview-streams"></div>
</div>

<script>
let currentTab = "dashboard";
let cachedEvents = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event.currentTarget.classList.add("active");

  document.getElementById("view-dashboard").style.display = tab === "dashboard" ? "block" : "none";
  document.getElementById("view-multiview").style.display = tab === "multiview" ? "block" : "none";

  if (tab === "multiview" && cachedEvents) {
    renderMultiview(cachedEvents);
  }
}

function setDate() {
  const d = new Date();
  const opts = { weekday: "long", month: "long", day: "numeric" };
  document.getElementById("date").innerText =
    "Events happening today: " + d.toLocaleDateString(undefined, opts);
}

async function load() {
  const week = document.getElementById("week").value;
  const loading = document.getElementById("loading");
  const streams = document.getElementById("streams");

  loading.style.display = "flex";
  streams.innerHTML = "";
  document.getElementById("multiview-streams").innerHTML = "";

  try {
    const res = await fetch(`/.netlify/functions/dashboard?week=${encodeURIComponent(week)}`);
    if (!res.ok) throw new Error("Server error: " + res.status);
    const data = await res.json();
    cachedEvents = data;
    loading.style.display = "none";
    render(data);
    if (currentTab === "multiview") renderMultiview(data);
    updateCountdowns();
  } catch (err) {
    loading.style.display = "none";
    streams.innerHTML = "<p class='empty'>Failed to load events. Please try refreshing.</p>";
    console.error(err);
  }
}

function render(events) {
  const div = document.getElementById("streams");
  div.innerHTML = "";

  if (!events || events.length === 0) {
    div.innerHTML = "<p class='empty'>No events are scheduled for today.</p>";
    return;
  }

  const twitchParent = encodeURIComponent(location.hostname);

  events.forEach(e => {
    // Badge
    let badge = "";
    if (e.type !== "none" && e.isLive) {
      badge = `<span class="live-badge">🔴 Live</span>`;
    } else {
      badge = `<span class="nostream-badge">📅 Today</span>`;
    }

    // Links
    const tbaLink = `<a href="https://thebluealliance.com/event/${e.key}" target="_blank">↗ View on TBA</a>`;
    const streamLink = e.type !== "none"
      ? `<a href="${e.link}" target="_blank">↗ Open Stream</a> ${tbaLink}`
      : tbaLink;

    // Upcoming schedule table
    let scheduleHTML = "";
    if (e.upcomingSchedule && e.upcomingSchedule.length) {
      const rows = e.upcomingSchedule.map((m, i) => {
        const isNext = i === 0;
        return `<tr class="${isNext ? "next-row" : ""}" data-time="${m.time}">
          <td><span class="schedule-match-key">${m.key}</span></td>
          <td class="eta-cell" data-time="${m.time}">—</td>
        </tr>`;
      }).join("");
      scheduleHTML = `<div class="schedule-title">⏭ Upcoming Matches</div>
        <table class="schedule-table">
          <thead><tr><th>Match</th><th style="text-align:right">ETA</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // Top 5 rankings on summary card
    let rankingsHTML = "";
    if (e.rankings && e.rankings.length) {
      const rows = e.rankings.map(r =>
        `<tr>
          <td>${r.rank}</td>
          <td class="team">${r.team}</td>
          <td class="record">${r.wins}-${r.losses}${r.ties ? "-" + r.ties : ""}</td>
        </tr>`
      ).join("");
      rankingsHTML = `<div class="rankings">
        <div class="rankings-title">🏆 Top 5 Rankings</div>
        <table>${rows}</table>
      </div>`;
    }

    // ── Panel: stream ──
    let panelStream = "";
    if (e.type === "youtube") {
      panelStream = `<div class="panel-stream">
        <iframe src="https://www.youtube.com/embed/${e.channel}?autoplay=0"
          allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>`;
    } else if (e.type === "twitch") {
      panelStream = `<div class="panel-stream">
        <iframe src="https://player.twitch.tv/?channel=${e.channel}&parent=${twitchParent}"
          allowfullscreen>
        </iframe>
      </div>`;
    } else {
      panelStream = `<div class="panel-stream">
        <div class="no-stream-msg">No stream listed — check TBA or the event's website for a link.</div>
      </div>`;
    }

    // ── Panel: full rankings ──
    let fullRankHTML = `<div class="panel-empty">No rankings yet.</div>`;
    if (e.fullRankings && e.fullRankings.length) {
      const rows = e.fullRankings.map(r =>
        `<tr>
          <td>${r.rank}</td>
          <td class="team">${r.team}</td>
          <td class="record">${r.wins}-${r.losses}${r.ties ? "-" + r.ties : ""}</td>
        </tr>`
      ).join("");
      fullRankHTML = `<table class="full-rank-table">
        <thead><tr><th>#</th><th>Team</th><th>W-L</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    // ── Panel: recent matches ──
    let recentHTML = `<div class="panel-empty">No completed matches yet.</div>`;
    if (e.recentMatches && e.recentMatches.length) {
      const rows = e.recentMatches.map(m =>
        `<tr>
          <td class="match-key">${m.key}</td>
          <td>
            <div class="score-line">
              <span class="score-red">${m.redScore}</span>
              <span class="score-sep">–</span>
              <span class="score-blue">${m.blueScore}</span>
            </div>
            <div class="teams-line">
              <span class="teams-red">${m.redTeams.join(", ")}</span>
              <span class="score-sep"> vs </span>
              <span class="teams-blue">${m.blueTeams.join(", ")}</span>
            </div>
          </td>
        </tr>`
      ).join("");
      recentHTML = `<table class="matches-table">
        <thead><tr><th>Match</th><th>Result</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    const block = document.createElement("div");
    block.className = "event";
    block.innerHTML = `
      <div class="event-summary">
        <div class="event-header">
          ${badge}
          <div class="event-name">
            ${e.name}
            <span class="chevron">▶</span>
          </div>
        </div>
        <div class="event-meta">
          <span>${e.city}, ${e.country}</span>
          <span>Week ${Number(e.week) + 1}</span>
          ${streamLink}
        </div>
        ${scheduleHTML}
        ${rankingsHTML}
      </div>
      <div class="event-panel">
        ${panelStream}
        <div class="panel-columns">
          <div class="panel-col">
            <div class="panel-title">Full Rankings</div>
            ${fullRankHTML}
          </div>
          <div class="panel-col">
            <div class="panel-title">Last 10 Matches</div>
            ${recentHTML}
          </div>
        </div>
      </div>
    `;

    block.querySelector(".event-name").addEventListener("click", () => {
      block.classList.toggle("open");
    });

    div.appendChild(block);
  });
}

function renderMultiview(events) {
  const div = document.getElementById("multiview-streams");
  div.innerHTML = "";

  if (!events || events.length === 0) {
    div.innerHTML = "<p class='empty'>No events are scheduled for today.</p>";
    return;
  }

  const twitchParent = encodeURIComponent(location.hostname);

  events.forEach(e => {
    let badge = "";
    if (e.type !== "none" && e.isLive) {
      badge = `<span class="live-badge">🔴 Live</span>`;
    } else {
      badge = `<span class="nostream-badge">📅 Today</span>`;
    }

    const tbaLink = `<a href="https://thebluealliance.com/event/${e.key}" target="_blank">↗ TBA</a>`;
    const streamLink = e.type !== "none"
      ? `<a href="${e.link}" target="_blank">↗ Stream</a> · ${tbaLink}`
      : tbaLink;

    let streamHTML = "";
    if (e.type === "youtube") {
      streamHTML = `<div class="mv-stream">
        <iframe src="https://www.youtube.com/embed/${e.channel}?autoplay=0"
          allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>`;
    } else if (e.type === "twitch") {
      streamHTML = `<div class="mv-stream">
        <iframe src="https://player.twitch.tv/?channel=${e.channel}&parent=${twitchParent}"
          allowfullscreen>
        </iframe>
      </div>`;
    } else {
      streamHTML = `<div class="mv-stream">
        <div class="no-stream-msg">No stream listed for this event.</div>
      </div>`;
    }

    const card = document.createElement("div");
    card.className = "mv-card";
    card.innerHTML = `
      <div class="mv-header">
        <div class="mv-title-row">
          ${badge}
          <div class="mv-name">${e.name}</div>
        </div>
        <div class="mv-meta">
          <span>${e.city}, ${e.country}</span>
          <span>Week ${Number(e.week) + 1}</span>
          ${streamLink}
        </div>
      </div>
      ${streamHTML}
    `;

    div.appendChild(card);
  });
}

function updateCountdowns() {
  const now = Date.now() / 1000;
  document.querySelectorAll(".eta-cell[data-time]").forEach(cell => {
    const t = parseInt(cell.dataset.time, 10);
    const diff = t - now;
    if (diff <= 0) {
      cell.innerHTML = `<span class="on-field">On Field</span>`;
    } else {
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      cell.textContent = h > 0 ? `~${h}h ${m}m` : `~${m} min`;
    }
  });
}

setInterval(updateCountdowns, 10000);

setDate();
load();
</script>

</body>
</html>
