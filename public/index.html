<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title> FRC Live </title>
<link rel="icon" type="image/png" href="struens-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --red:    #ff3b3b;
  --blue:   #6ee7ff;
  --bg:     #0d0d10;
  --card:   #16161c;
  --panel:  #111117;
  --border: #2a2a35;
  --text:   #e8e8f0;
  --muted:  #7a7a90;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  padding: 28px 24px;
  min-height: 100vh;
}

header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  margin-bottom: 6px;
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

h1 span { color: var(--red); }

#date {
  font-size: 0.95rem;
  color: var(--muted);
  margin-bottom: 20px;
  font-weight: 500;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

.tab-btn {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.1s;
}

.tab-btn:hover { color: var(--text); border-color: #3a3a50; }
.tab-btn:active { transform: scale(0.97); }

.tab-btn.active {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

select {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 14px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

select:hover, select:focus { border-color: var(--blue); }

button {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}

button:hover  { background: #e02d2d; }
button:active { transform: scale(0.97); }

#loading {
  display: none;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 20px;
}

.spinner {
  width: 20px;
  height: 20px;
  border: 3px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
  gap: 22px;
}

/* ── Card ── */
.event {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s;
}

.event:hover { border-color: #3a3a50; }

/* Summary — original padding/gap preserved exactly */
.event-summary {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.event-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-badge {
  background: var(--red);
  color: white;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.nostream-badge {
  background: #2a2a35;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

/* Clickable event name */
.event-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  line-height: 1.2;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.event-name:hover { color: var(--blue); }

.chevron {
  font-size: 0.65rem;
  color: var(--muted);
  transition: transform 0.22s;
  display: inline-block;
  flex-shrink: 0;
}

.event.open .chevron { transform: rotate(90deg); }

.event-meta {
  font-size: 0.82rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.event-meta a {
  color: var(--blue);
  text-decoration: none;
  font-weight: 500;
}

.event-meta a:hover { text-decoration: underline; }

.no-stream-msg {
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
}

.rankings { font-size: 0.82rem; }

.rankings-title {
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.rankings table { width: 100%; border-collapse: collapse; }
.rankings td { padding: 3px 8px 3px 0; color: var(--text); }
.rankings td:first-child { color: var(--muted); width: 24px; }
.rankings td.team {
  color: var(--blue);
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
}
.rankings td.record { color: var(--muted); text-align: right; }

.next-match { font-size: 0.85rem; color: var(--muted); }
.next-match b { color: var(--text); }

.schedule-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
  margin-top: 4px;
}

.schedule-table th {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 8px 5px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.schedule-table th:last-child { text-align: right; }

.schedule-table td {
  padding: 4px 8px 4px 0;
  border-bottom: 1px solid #1a1a24;
  vertical-align: middle;
}

.schedule-table td:last-child { text-align: right; }

.schedule-table tr.next-row td { color: var(--text); }

.schedule-match-key {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--blue);
}

.schedule-table tr.next-row .schedule-match-key { color: var(--red); }

.eta-cell { font-variant-numeric: tabular-nums; color: var(--muted); white-space: nowrap; }

.on-field {
  color: var(--red);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  animation: blink-red 1s ease-in-out infinite;
}

@keyframes blink-red {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.schedule-title {
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.empty { color: var(--muted); font-size: 1rem; padding: 20px 0; }

/* ── Expanded panel ── */
.event-panel {
  display: none;
  flex-direction: column;
  border-top: 1px solid var(--border);
  background: var(--panel);
}

.event.open .event-panel { display: flex; }

.panel-stream iframe {
  width: 100%;
  height: 270px;
  border: none;
  border-radius: 0;
  background: #000;
  display: block;
}

.panel-stream .no-stream-msg {
  padding: 16px 18px;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
}

.panel-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--border);
}

.panel-col {
  padding: 16px 18px;
}

.panel-col:first-child {
  border-right: 1px solid var(--border);
}

.panel-title {
  color: var(--muted);
  font-size: 0.72rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* Full rankings in panel */
.full-rank-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.full-rank-table th {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 6px 6px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.full-rank-table th:last-child { text-align: right; }

.full-rank-table td {
  padding: 4px 6px 4px 0;
  border-bottom: 1px solid #1a1a24;
}

.full-rank-table td:first-child { color: var(--muted); width: 22px; }
.full-rank-table td.team {
  color: var(--blue);
  font-weight: 600;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
}
.full-rank-table td.record { color: var(--muted); text-align: right; }

/* Recent matches in panel */
.matches-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.matches-table th {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 0 0 6px 0;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.matches-table td {
  padding: 5px 0;
  border-bottom: 1px solid #1a1a24;
  vertical-align: top;
}

.match-key {
  color: var(--muted);
  font-size: 0.78rem;
  white-space: nowrap;
  padding-right: 10px;
}

.score-line {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}

.score-red  { color: #ff6b6b; }
.score-blue { color: #6eb8ff; }
.score-sep  { color: var(--muted); font-size: 0.8rem; }

.teams-line {
  font-size: 0.74rem;
  color: var(--muted);
  margin-top: 2px;
}

.teams-red  { color: #ff9a9a; }
.teams-blue { color: #9ac8ff; }

.panel-empty {
  color: var(--muted);
  font-size: 0.82rem;
  font-style: italic;
}

/* ── Multiview ── */
#view-multiview { display: none; }

/* Control bar */
.mv-controls {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.mv-section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

.mv-layout-picker { display: flex; flex-direction: column; }

.mv-layout-options {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.mv-layout-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  white-space: nowrap;
}
.mv-layout-btn:hover { border-color: #3a3a50; color: var(--text); }
.mv-layout-btn:active { transform: scale(0.97); }
.mv-layout-btn.active { border-color: var(--red); color: var(--text); background: #1f1218; }
.mv-layout-btn svg { width: 22px; height: 16px; flex-shrink: 0; }

.mv-stream-selector { display: flex; flex-direction: column; flex: 1; min-width: 200px; }

.mv-stream-checks { display: flex; flex-wrap: wrap; gap: 6px; }

.mv-stream-check {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--muted);
  transition: border-color 0.15s, color 0.15s;
  user-select: none;
}
.mv-stream-check input { display: none; }
.mv-stream-check.checked { border-color: var(--blue); color: var(--text); }
.mv-stream-check .check-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); flex-shrink: 0; transition: background 0.15s;
}
.mv-stream-check.checked .check-dot { background: var(--blue); }
.mv-stream-check .live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  animation: blink-red 1s ease-in-out infinite;
}

/* Grid layouts */
.mv-grid { display: grid; gap: 4px; }
.mv-grid[data-layout="single"]   { grid-template-columns: 1fr; }
.mv-grid[data-layout="vsplit"]   { grid-template-columns: 1fr 1fr; }
.mv-grid[data-layout="hsplit"]   { grid-template-columns: 1fr; }
.mv-grid[data-layout="1plus2"]   { grid-template-columns: 2fr 1fr; }
.mv-grid[data-layout="quad"]     { grid-template-columns: 1fr 1fr; }
.mv-grid[data-layout="1plus3"]   { grid-template-columns: 2fr 1fr; }
.mv-grid[data-layout="1plus4"]   { grid-template-columns: 3fr 1fr; }
.mv-grid[data-layout="hex"]      { grid-template-columns: 1fr 1fr 1fr; }
.mv-grid[data-layout="1plus6"]   { grid-template-columns: 2fr 1fr 1fr; }
.mv-grid[data-layout="octo"]     { grid-template-columns: 1fr 1fr 1fr 1fr; }
.mv-grid[data-layout="octo-v"]   { grid-template-columns: 1fr 1fr; }
.mv-grid[data-layout="nona"]     { grid-template-columns: 1fr 1fr 1fr; }
.mv-grid[data-layout="all"]      { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); }

.mv-grid[data-layout="1plus2"] .mv-slot:first-child  { grid-row: span 2; }
.mv-grid[data-layout="1plus3"] .mv-slot:first-child  { grid-row: span 3; }
.mv-grid[data-layout="1plus4"] .mv-slot:first-child  { grid-row: span 4; }
.mv-grid[data-layout="1plus6"] .mv-slot:first-child  { grid-row: span 3; }

.mv-slot {
  background: #000;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
.mv-slot iframe {
  width: 100%; height: 100%; min-height: 200px;
  border: none; display: block;
}
.mv-slot-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.75));
  padding: 18px 10px 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem; font-weight: 600; color: #fff;
  pointer-events: none;
  display: flex; align-items: center; gap: 6px;
}
.mv-slot-label .live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); animation: blink-red 1s ease-in-out infinite; flex-shrink: 0;
}
.mv-no-streams { color: var(--muted); font-size: 0.9rem; font-style: italic; padding: 20px 0; }

.multiview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap: 20px;
}

.mv-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s;
}

.mv-card:hover { border-color: #3a3a50; }

.mv-header {
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}

.mv-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mv-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.2;
}

.mv-meta {
  font-size: 0.8rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.mv-meta a {
  color: var(--blue);
  text-decoration: none;
  font-weight: 500;
}

.mv-meta a:hover { text-decoration: underline; }

.mv-stream iframe {
  width: 100%;
  height: 270px;
  border: none;
  background: #000;
  display: block;
}

.mv-stream .no-stream-msg {
  padding: 20px 16px;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
  text-align: center;
}

</style>
</head>
<body>

<header>
  <h1>FRC <span>Live</span> Dashboard</h1>
</header>
<div id="date"></div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
  <button class="tab-btn" onclick="switchTab('multiview')">Multiview</button>
</div>

<div class="controls">
  <select id="week">
    <option value="all">All Weeks</option>
    <option value="0">Week 1</option>
    <option value="1">Week 2</option>
    <option value="2">Week 3</option>
    <option value="3">Week 4</option>
    <option value="4">Week 5</option>
    <option value="5">Week 6</option>
    <option value="6">Week 7</option>
  </select>
  <button onclick="load()">↺ Refresh</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  Loading events...
</div>

<!-- Dashboard view -->
<div id="view-dashboard">
  <div class="grid" id="streams"></div>
</div>

<!-- Multiview -->
<div id="view-multiview">

  <div class="mv-controls">
    <div class="mv-layout-picker">
      <div class="mv-section-label">Layout</div>
      <div class="mv-layout-options" id="mv-layout-options"></div>
    </div>
    <div class="mv-stream-selector">
      <div class="mv-section-label">Streams</div>
      <div class="mv-stream-checks" id="mv-stream-checks"></div>
    </div>
  </div>

  <div id="mv-grid-wrap"></div>
</div>

<script>
let currentTab = "dashboard";
let cachedEvents = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event.currentTarget.classList.add("active");

  document.getElementById("view-dashboard").style.display = tab === "dashboard" ? "block" : "none";
  document.getElementById("view-multiview").style.display = tab === "multiview" ? "block" : "none";

  if (tab === "multiview" && cachedEvents) {
    renderMultiview(cachedEvents);
  }
}

function setDate() {
  const d = new Date();
  const opts = { weekday: "long", month: "long", day: "numeric" };
  document.getElementById("date").innerText =
    "Events happening today: " + d.toLocaleDateString(undefined, opts);
}

async function load() {
  const week = document.getElementById("week").value;
  const loading = document.getElementById("loading");
  const streams = document.getElementById("streams");

  loading.style.display = "flex";
  streams.innerHTML = "";
  document.getElementById("mv-grid-wrap").innerHTML = "";

  try {
    const res = await fetch(`/.netlify/functions/dashboard?week=${encodeURIComponent(week)}`);
    if (!res.ok) throw new Error("Server error: " + res.status);
    const data = await res.json();
    cachedEvents = data;
    loading.style.display = "none";
    render(data);
    if (currentTab === "multiview") renderMultiview(data);
    updateCountdowns();
  } catch (err) {
    loading.style.display = "none";
    streams.innerHTML = "<p class='empty'>Failed to load events. Please try refreshing.</p>";
    console.error(err);
  }
}

function render(events) {
  const div = document.getElementById("streams");
  div.innerHTML = "";

  if (!events || events.length === 0) {
    div.innerHTML = "<p class='empty'>No events are scheduled for today.</p>";
    return;
  }

  const twitchParent = encodeURIComponent(location.hostname);

  events.forEach(e => {
    // Badge
    let badge = "";
    if (e.type !== "none" && e.isLive) {
      badge = `<span class="live-badge">🔴 Live</span>`;
    } else {
      badge = `<span class="nostream-badge">📅 Today</span>`;
    }

    // Links
    const tbaLink = `<a href="https://thebluealliance.com/event/${e.key}" target="_blank">↗ View on TBA</a>`;
    const streamLink = e.type !== "none"
      ? `<a href="${e.link}" target="_blank">↗ Open Stream</a> ${tbaLink}`
      : tbaLink;

    // Upcoming schedule table
    let scheduleHTML = "";
    if (e.upcomingSchedule && e.upcomingSchedule.length) {
      const rows = e.upcomingSchedule.map((m, i) => {
        const isNext = i === 0;
        return `<tr class="${isNext ? "next-row" : ""}" data-time="${m.time}">
          <td><span class="schedule-match-key">${m.key}</span></td>
          <td class="eta-cell" data-time="${m.time}">—</td>
        </tr>`;
      }).join("");
      scheduleHTML = `<div class="schedule-title">⏭ Upcoming Matches</div>
        <table class="schedule-table">
          <thead><tr><th>Match</th><th style="text-align:right">ETA</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // Top 5 rankings on summary card
    let rankingsHTML = "";
    if (e.rankings && e.rankings.length) {
      const rows = e.rankings.map(r =>
        `<tr>
          <td>${r.rank}</td>
          <td class="team">${r.team}</td>
          <td class="record">${r.wins}-${r.losses}${r.ties ? "-" + r.ties : ""}</td>
        </tr>`
      ).join("");
      rankingsHTML = `<div class="rankings">
        <div class="rankings-title">🏆 Top 5 Rankings</div>
        <table>${rows}</table>
      </div>`;
    }

    // ── Panel: stream ──
    let panelStream = "";
    if (e.type === "youtube") {
      panelStream = `<div class="panel-stream">
        <iframe src="https://www.youtube.com/embed/${e.channel}?autoplay=0"
          allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>`;
    } else if (e.type === "twitch") {
      panelStream = `<div class="panel-stream">
        <iframe src="https://player.twitch.tv/?channel=${e.channel}&parent=${twitchParent}"
          allowfullscreen>
        </iframe>
      </div>`;
    } else {
      panelStream = `<div class="panel-stream">
        <div class="no-stream-msg">No stream listed — check TBA or the event's website for a link.</div>
      </div>`;
    }

    // ── Panel: full rankings ──
    let fullRankHTML = `<div class="panel-empty">No rankings yet.</div>`;
    if (e.fullRankings && e.fullRankings.length) {
      const rows = e.fullRankings.map(r =>
        `<tr>
          <td>${r.rank}</td>
          <td class="team">${r.team}</td>
          <td class="record">${r.wins}-${r.losses}${r.ties ? "-" + r.ties : ""}</td>
        </tr>`
      ).join("");
      fullRankHTML = `<table class="full-rank-table">
        <thead><tr><th>#</th><th>Team</th><th>W-L</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    // ── Panel: recent matches ──
    let recentHTML = `<div class="panel-empty">No completed matches yet.</div>`;
    if (e.recentMatches && e.recentMatches.length) {
      const rows = e.recentMatches.map(m =>
        `<tr>
          <td class="match-key">${m.key}</td>
          <td>
            <div class="score-line">
              <span class="score-red">${m.redScore}</span>
              <span class="score-sep">–</span>
              <span class="score-blue">${m.blueScore}</span>
            </div>
            <div class="teams-line">
              <span class="teams-red">${m.redTeams.join(", ")}</span>
              <span class="score-sep"> vs </span>
              <span class="teams-blue">${m.blueTeams.join(", ")}</span>
            </div>
          </td>
        </tr>`
      ).join("");
      recentHTML = `<table class="matches-table">
        <thead><tr><th>Match</th><th>Result</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    const block = document.createElement("div");
    block.className = "event";
    block.innerHTML = `
      <div class="event-summary">
        <div class="event-header">
          ${badge}
          <div class="event-name">
            ${e.name}
            <span class="chevron">▶</span>
          </div>
        </div>
        <div class="event-meta">
          <span>${e.city}, ${e.country}</span>
          <span>Week ${Number(e.week) + 1}</span>
          ${streamLink}
        </div>
        ${scheduleHTML}
        ${rankingsHTML}
      </div>
      <div class="event-panel">
        ${panelStream}
        <div class="panel-columns">
          <div class="panel-col">
            <div class="panel-title">Full Rankings</div>
            ${fullRankHTML}
          </div>
          <div class="panel-col">
            <div class="panel-title">Last 10 Matches</div>
            ${recentHTML}
          </div>
        </div>
      </div>
    `;

    block.querySelector(".event-name").addEventListener("click", () => {
      block.classList.toggle("open");
    });

    div.appendChild(block);
  });
}

// ── Multiview state ──

  { id: "1plus3",  label: "1+3",          slots: 4,  icon: `<svg viewBox="0 0 22 16"><rect x="1" y="1" width="13" height="14" rx="1" fill="currentColor"/><rect x="16" y="1" width="5" height="4" rx="1" fill="currentColor"/><rect x="16" y="6" width="5" height="4" rx="1" fill="currentColor"/><rect x="16" y="11" width="5" height="4" rx="1" fill="currentColor"/></svg>` },
  { id: "1plus4",  label: "1+4",          slots: 5,  icon: `<svg viewBox="0 0 22 16"><rect x="1" y="1" width="14" height="14" rx="1" fill="currentColor"/><rect x="17" y="1" width="4" height="3" rx="1" fill="currentColor"/><rect x="17" y="5" width="4" height="3" rx="1" fill="currentColor"/><rect x="17" y="9" width="4" height="3" rx="1" fill="currentColor"/><rect x="17" y="13" width="4" height="2" rx="1" fill="currentColor"/></svg>` },

  { id: "1plus6",  label: "1+6",          slots: 7,  icon: `<svg viewBox="0 0 22 16"><rect x="1" y="1" width="12" height="14" rx="1" fill="currentColor"/><rect x="14" y="1" width="3" height="4" rx="1" fill="currentColor"/><rect x="18" y="1" width="3" height="4" rx="1" fill="currentColor"/><rect x="14" y="6" width="3" height="4" rx="1" fill="currentColor"/><rect x="18" y="6" width="3" height="4" rx="1" fill="currentColor"/><rect x="14" y="11" width="3" height="4" rx="1" fill="currentColor"/><rect x="18" y="11" width="3" height="4" rx="1" fill="currentColor"/></svg>` },
  { id: "octo",    label: "Octo",         slots: 8,  icon: `<svg viewBox="0 0 22 16"><rect x="1" y="1" width="4" height="6" rx="1" fill="currentColor"/><rect x="6" y="1" width="4" height="6" rx="1" fill="currentColor"/><rect x="11" y="1" width="4" height="6" rx="1" fill="currentColor"/><rect x="16" y="1" width="5" height="6" rx="1" fill="currentColor"/><rect x="1" y="9" width="4" height="6" rx="1" fill="currentColor"/><rect x="6" y="9" width="4" height="6" rx="1" fill="currentColor"/><rect x="11" y="9" width="4" height="6" rx="1" fill="currentColor"/><rect x="16" y="9" width="5" height="6" rx="1" fill="currentColor"/></svg>` },
  { id: "octo-v",  label: "Octo Vert",   slots: 8,  icon: `<svg viewBox="0 0 22 16"><rect x="1" y="1" width="9" height="3" rx="1" fill="currentColor"/><rect x="12" y="1" width="9" height="3" rx="1" fill="currentColor"/><rect x="1" y="5" width="9" height="3" rx="1" fill="currentColor"/><rect x="12" y="5" width="9" height="3" rx="1" fill="currentColor"/><rect x="1" y="9" width="9" height="3" rx="1" fill="currentColor"/><rect x="12" y="9" width="9" height="3" rx="1" fill="currentColor"/><rect x="1" y="13" width="9" height="2" rx="1" fill="currentColor"/><rect x="12" y="13" width="9" height="2" rx="1" fill="currentColor"/></svg>` },
  { id: "nona",    label: "Nona",         slots: 9,  icon: `<svg viewBox="0 0 22 16"><rect x="1" y="1" width="6" height="4" rx="1" fill="currentColor"/><rect x="8" y="1" width="6" height="4" rx="1" fill="currentColor"/><rect x="15" y="1" width="6" height="4" rx="1" fill="currentColor"/><rect x="1" y="6" width="6" height="4" rx="1" fill="currentColor"/><rect x="8" y="6" width="6" height="4" rx="1" fill="currentColor"/><rect x="15" y="6" width="6" height="4" rx="1" fill="currentColor"/><rect x="1" y="11" width="6" height="4" rx="1" fill="currentColor"/><rect x="8" y="11" width="6" height="4" rx="1" fill="currentColor"/><rect x="15" y="11" width="6" height="4" rx="1" fill="currentColor"/></svg>` },
  { id: "all",     label: "All Live",     slots: 99, icon: `<svg viewBox="0 0 22 16"><circle cx="4" cy="8" r="2.5" fill="currentColor"/><circle cx="11" cy="8" r="2.5" fill="currentColor"/><circle cx="18" cy="8" r="2.5" fill="currentColor"/></svg>` },
];

let mvLayout = "quad";
let mvSelectedKeys = new Set();
let mvAllKeys = [];

function initMultiviewControls(events) {
  // Layout buttons
  const layoutWrap = document.getElementById("mv-layout-options");
  layoutWrap.innerHTML = "";
  MV_LAYOUTS.forEach(l => {
    const btn = document.createElement("button");
    btn.className = "mv-layout-btn" + (l.id === mvLayout ? " active" : "");
    btn.innerHTML = l.icon + l.label;
    btn.onclick = () => {
      mvLayout = l.id;
      document.querySelectorAll(".mv-layout-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      applyMultiviewLayout();
    };
    layoutWrap.appendChild(btn);
  });

  // Stream checkboxes — only events with a stream
  const streamable = events.filter(e => e.type !== "none");
  mvAllKeys = streamable.map(e => e.key);
  // Default: select all live ones, or all if none are live
  const live = streamable.filter(e => e.isLive).map(e => e.key);
  mvSelectedKeys = new Set(live.length ? live : mvAllKeys);

  const checksWrap = document.getElementById("mv-stream-checks");
  checksWrap.innerHTML = "";
  streamable.forEach(e => {
    const label = document.createElement("label");
    label.className = "mv-stream-check" + (mvSelectedKeys.has(e.key) ? " checked" : "");
    const dot = e.isLive
      ? `<span class="live-dot"></span>`
      : `<span class="check-dot"></span>`;
    label.innerHTML = `<input type="checkbox" ${mvSelectedKeys.has(e.key) ? "checked" : ""}>${dot}${e.name}`;
    label.querySelector("input").addEventListener("change", ev => {
      if (ev.target.checked) { mvSelectedKeys.add(e.key); label.classList.add("checked"); }
      else { mvSelectedKeys.delete(e.key); label.classList.remove("checked"); }
      applyMultiviewLayout();
    });
    checksWrap.appendChild(label);
  });
}

function applyMultiviewLayout() {
  if (!cachedEvents) return;
  const twitchParent = encodeURIComponent(location.hostname);
  const wrap = document.getElementById("mv-grid-wrap");

  const layout = MV_LAYOUTS.find(l => l.id === mvLayout);
  const streamable = cachedEvents.filter(e => e.type !== "none");

  // For "all" layout, show every selected stream regardless of slot count
  // For others, cap to layout.slots
  let toShow;
  if (mvLayout === "all") {
    toShow = streamable.filter(e => mvSelectedKeys.has(e.key));
  } else {
    toShow = streamable.filter(e => mvSelectedKeys.has(e.key)).slice(0, layout.slots);
  }

  if (toShow.length === 0) {
    wrap.innerHTML = `<p class="mv-no-streams">No streams selected. Pick some above.</p>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "mv-grid";
  grid.dataset.layout = mvLayout;

  // For "all", dynamically pick a sensible column count
  if (mvLayout === "all") {
    const n = toShow.length;
    const cols = n <= 1 ? 1 : n <= 2 ? 2 : n <= 4 ? 2 : n <= 6 ? 3 : n <= 9 ? 3 : 4;
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  }

  toShow.forEach(e => {
    const slot = document.createElement("div");
    slot.className = "mv-slot";

    let iframeSrc = "";
    if (e.type === "youtube") {
      iframeSrc = `https://www.youtube.com/embed/${e.channel}?autoplay=0`;
    } else if (e.type === "twitch") {
      iframeSrc = `https://player.twitch.tv/?channel=${e.channel}&parent=${twitchParent}`;
    }

    const liveDot = e.isLive ? `<span class="live-dot"></span>` : "";
    slot.innerHTML = `
      <iframe src="${iframeSrc}" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
      <div class="mv-slot-label">${liveDot}${e.name}</div>
    `;
    grid.appendChild(slot);
  });

  wrap.innerHTML = "";
  wrap.appendChild(grid);
}

function renderMultiview(events) {
  if (!events || events.length === 0) {
    document.getElementById("mv-grid-wrap").innerHTML = "<p class=\'empty\'>No events scheduled today.</p>";
    return;
  }
  initMultiviewControls(events);
  applyMultiviewLayout();
}

function updateCountdowns() {
  const now = Date.now() / 1000;
  document.querySelectorAll(".eta-cell[data-time]").forEach(cell => {
    const t = parseInt(cell.dataset.time, 10);
    const diff = t - now;
    if (diff <= 0) {
      cell.innerHTML = `<span class="on-field">On Field</span>`;
    } else {
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      cell.textContent = h > 0 ? `~${h}h ${m}m` : `~${m} min`;
    }
  });
}

setInterval(updateCountdowns, 10000);

setDate();
load();
</script>
